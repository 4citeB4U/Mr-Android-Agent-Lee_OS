<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Agent Lee // Sovereign IDE</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <!-- Tailwind + fonts bundled locally via Vite — no CDN, no network required on Pi -->
    <style>
      :root {
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-bg: rgba(20, 20, 25, 0.6);
        --glass-highlight: rgba(255, 255, 255, 0.05);
        --stark-blue: #00a3ff;
        --stark-cyan: #00f0ff;
        --apple-grey: #1c1c1e;
        --core-glow: 0 0 20px rgba(0, 163, 255, 0.3);
      }

      body {
        background-color: #000000;
        color: #e5e5e5;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        overflow: hidden;
      }

      /* Smooth Apple-like scrolling */
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }

      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }

      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.2);
        border-radius: 10px;
      }

      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.4);
      }

      /* Glassmorphism Utilities */
      .glass-panel {
        background: var(--glass-bg);
        -webkit-backdrop-filter: blur(20px);
        backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      }

      .stark-border {
        position: relative;
      }

      .stark-border::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 40%;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--stark-blue),
          transparent
        );
        opacity: 0.5;
      }

      /* Subtle Grid Background (The Mesh) */
      .holo-grid {
        background-size: 50px 50px;
        background-image:
          linear-gradient(
            to right,
            rgba(255, 255, 255, 0.02) 1px,
            transparent 1px
          ),
          linear-gradient(
            to bottom,
            rgba(255, 255, 255, 0.02) 1px,
            transparent 1px
          );
        -webkit-mask-image: radial-gradient(
          circle at center,
          black 40%,
          transparent 100%
        );
        mask-image: radial-gradient(
          circle at center,
          black 40%,
          transparent 100%
        );
      }
    </style>
    <!-- All deps bundled by Vite — no importmap needed -->
  </head>

  <body>
    <div id="root"></div>
    <h1 class="sr-only">Agent Lee Sovereign IDE</h1>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
