name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Stub LeeWay-Standards for CI
        run: |
          if [ ! -f LeeWay-Standards/package.json ]; then
            mkdir -p LeeWay-Standards/src
            echo '{"name":"leeway-sdk","version":"1.0.1","type":"module","main":"src/index.js"}' > LeeWay-Standards/package.json
            echo 'export default {};' > LeeWay-Standards/src/index.js
          fi

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
