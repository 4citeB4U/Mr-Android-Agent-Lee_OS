  <text x="764" y="374" class="label">Memory Lake</text>
  <text x="764" y="400" class="small" font-size="13">Long-term recall, knowledge</text>
  <text x="764" y="420" class="small" font-size="13">Sage dream index</text>

  <!-- Code Studio -->
  <rect x="1044" y="316" width="280" height="130" rx="16" fill="#1C1004" stroke="#F97316" stroke-width="2"/>
  <text x="1064" y="344" class="caps" fill="#F97316">G3 · ENGINEERING</text>
  <text x="1064" y="374" class="label">Code Studio</text>
  <text x="1064" y="400" class="small" font-size="13">VM tasks, build, file ops</text>
  <text x="1064" y="420" class="small" font-size="13">Nova Forge powered</text>

  <!-- Page route cards — row 2 -->
  <!-- Creators Studio -->
  <rect x="144" y="466" width="280" height="130" rx="16" fill="#200A18" stroke="#EC4899" stroke-width="2"/>
  <text x="164" y="494" class="caps" fill="#EC4899">G4 · CREATIVE</text>
  <text x="164" y="524" class="label">Creators Studio</text>
  <text x="164" y="550" class="small" font-size="13">SVG, voxel, brand, media</text>
  <text x="164" y="570" class="small" font-size="13">Pixel + Aria + Echo</text>

  <!-- Database Hub -->
  <rect x="444" y="466" width="280" height="130" rx="16" fill="#100C26" stroke="#8B5CF6" stroke-width="2"/>
  <text x="464" y="494" class="caps" fill="#8B5CF6">G5 · DATA</text>
  <text x="464" y="524" class="label">Database Hub</text>
  <text x="464" y="550" class="small" font-size="13">Firebase, schema, queries</text>
  <text x="464" y="570" class="small" font-size="13">Sage + archive layer</text>

  <!-- Deployment -->
  <rect x="744" y="466" width="280" height="130" rx="16" fill="#001520" stroke="#00BFFF" stroke-width="2"/>
  <text x="764" y="494" class="caps" fill="#00BFFF">G6 · DEPLOYMENT</text>
  <text x="764" y="524" class="label">Deployment</text>
  <text x="764" y="550" class="small" font-size="13">Release, CI/CD, envs</text>
  <text x="764" y="570" class="small" font-size="13">Nexus-led launch gate</text>

