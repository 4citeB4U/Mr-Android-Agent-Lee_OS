  <!-- Home -->
  <rect x="144" y="316" width="280" height="130" rx="16" fill="#122236" stroke="#22D3EE" stroke-width="2"/>
  <text x="164" y="344" class="caps" fill="#22D3EE">G1 · HOME</text>
  <text x="164" y="374" class="label">Home</text>
  <text x="164" y="400" class="small" font-size="13">Welcome, status, quick-launch</text>
