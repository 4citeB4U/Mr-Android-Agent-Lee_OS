<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B111C"/>
      <stop offset="1" stop-color="#130C20"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#131D2E"/>
      <stop offset="1" stop-color="#0E1726"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .title    { font: 800 52px 'Segoe UI', Arial, sans-serif; fill: #FFFFFF; }
      .subtitle { font: 500 22px 'Segoe UI', Arial, sans-serif; fill: #C0D0DD; }
      .label    { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #FFFFFF; }
      .small    { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #B8CAD8; }
      .caps     { font: 800 13px 'Segoe UI', Arial, sans-serif; fill: #95F3FF; letter-spacing: 2px; }
      .zone     { font: 700 13px 'Segoe UI', Arial, sans-serif; letter-spacing: 1px; }
      .tiny     { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #7090A8; }
    </style>
  </defs>

  <!-- Main background -->
  <rect width="1600" height="980" rx="36" fill="url(#bg)"/>

  <!-- Title block -->
  <text x="80" y="88" class="title">AGENT LEE — APP LAYOUT BLUEPRINT</text>
  <text x="80" y="126" class="subtitle">Shell anatomy: header bar · main canvas · page routes · unified console · widget mode · nav dock</text>

  <!-- ═══════════════════════════════════════════════════════
       SHELL FRAME (dark card)
  ═══════════════════════════════════════════════════════ -->
  <rect x="100" y="162" width="1400" height="768" rx="28" fill="#0F1A28" stroke="#1E3248" stroke-width="2"/>

  <!-- HEADER BAR -->
  <rect x="100" y="162" width="1400" height="80" rx="28" fill="#11202E" stroke="#22374F" stroke-width="1.5"/>
  <rect x="100" y="210"  width="1400" height="32" fill="#11202E"/>
  <!-- Header contents -->
  <rect x="124" y="182" width="220" height="40" rx="12" fill="#1B2F44" stroke="#2E4D6A" stroke-width="1.5"/>
  <text x="144" y="208" class="zone" fill="#FFD700">⬡ AGENT LEE</text>
  <rect x="370" y="184" width="130" height="36" rx="10" fill="#162231" stroke="#1F3347"/>
  <text x="399" y="207" class="tiny" fill="#64B6E8">System</text>
  <rect x="516" y="184" width="130" height="36" rx="10" fill="#162231" stroke="#1F3347"/>
  <text x="547" y="207" class="tiny" fill="#64B6E8">Engines</text>
  <rect x="662" y="184" width="130" height="36" rx="10" fill="#162231" stroke="#1F3347"/>
  <text x="695" y="207" class="tiny" fill="#64B6E8">Status</text>
  <!-- Status pill -->
  <rect x="1280" y="185" width="100" height="34" rx="10" fill="#0E2518" stroke="#22C55E" stroke-width="1.5"/>
  <text x="1305" y="207" class="tiny" fill="#22C55E">● LIVE</text>
  <!-- Widget toggle -->
  <rect x="1398" y="185" width="88" height="34" rx="10" fill="#1A1130" stroke="#6D4AFF" stroke-width="1.5"/>
  <text x="1415" y="207" class="tiny" fill="#9B7CFF">Widget</text>
  <!-- Header label -->
  <text x="124" y="252" class="caps">HEADER / NAVIGATION BAR</text>

