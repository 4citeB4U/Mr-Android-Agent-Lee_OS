  <rect x="1044" y="466" width="280" height="130" rx="16" fill="#130D2A" stroke="#7C3AED" stroke-width="2"/>
  <text x="1064" y="494" class="caps" fill="#7C3AED">G8 · GOVERNANCE</text>
  <text x="1064" y="524" class="label">Gov Console</text>
  <text x="1064" y="550" class="small" font-size="13">Audit, standards, health</text>
  <text x="1064" y="570" class="small" font-size="13">Marshal + Corps panel</text>

  <!-- Row 3 — wide Universe panel -->
  <rect x="144" y="616" width="580" height="124" rx="16" fill="#0C1B2C" stroke="#FFD700" stroke-width="2"/>
  <text x="164" y="644" class="caps" fill="#FFD700">LEE WAY UNIVERSE · 3-D</text>
  <text x="164" y="674" class="label">LeeWay Universe</text>
  <text x="164" y="700" class="small" font-size="13">Three.js orbital canvas · all agents as celestial bodies</text>

