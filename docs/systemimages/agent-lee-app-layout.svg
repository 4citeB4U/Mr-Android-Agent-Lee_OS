  <rect x="744" y="616" width="580" height="124" rx="16" fill="#0F1E18" stroke="#10B981" stroke-width="2"/>
  <text x="764" y="644" class="caps" fill="#10B981">AGENT TEAM PANEL</text>
  <text x="764" y="674" class="label">Agent Team &amp; Chat</text>
  <text x="764" y="700" class="small" font-size="13">Agent picker, active status, multi-agent console</text>

  <!-- ═══════════════════════════════════════════════════════
       UNIFIED CONSOLE BAR
  ═══════════════════════════════════════════════════════ -->
  <rect x="100" y="776" width="1400" height="84" rx="0" fill="#0C1825" stroke="#1A2E44" stroke-width="1.5"/>
  <rect x="100" y="836" width="1400" height="24" rx="0" fill="#0C1825"/>
  <rect x="100" y="836" width="1400" height="14" rx="14" fill="#0C1825"/>
  <!-- Console bar contents -->
  <rect x="130" y="792" width="880" height="50" rx="14" fill="#111F30" stroke="#1E3550" stroke-width="1.5"/>
  <text x="154" y="823" class="small" fill="#607D90">Chat · Command · Query · Intent router entry</text>
  <rect x="1028" y="792" width="120" height="50" rx="14" fill="#122A1E" stroke="#22C55E" stroke-width="1.5"/>
  <text x="1053" y="823" class="small" fill="#22C55E">Send ↑</text>
  <rect x="1164" y="792" width="88" height="50" rx="14" fill="#16102E" stroke="#6D4AFF" stroke-width="1.5"/>
  <text x="1180" y="823" class="small" fill="#9B7CFF">Voice</text>
  <rect x="1268" y="792" width="88" height="50" rx="14" fill="#1A1010" stroke="#EF4444" stroke-width="1.5"/>
  <text x="1284" y="823" class="small" fill="#EF4444">Stop</text>
  <rect x="1372" y="792" width="108" height="50" rx="14" fill="#1C0C00" stroke="#F97316" stroke-width="1.5"/>
  <text x="1385" y="823" class="small" fill="#F97316">History</text>
  <text x="130" y="858" class="caps" fill="#2E4A62">UNIFIED CONSOLE — CHAT · NAVIGATION DOCK · QUICK ACTIONS · STATUS LAYER</text>

  <!-- Bottom footer note -->
  <text x="80" y="946" class="tiny">Presentation asset: shell anatomy for onboarding, investor decks, and in-app explainability. Each panel maps to a real route in App.tsx.</text>
</svg>