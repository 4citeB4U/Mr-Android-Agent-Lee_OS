<svg width="1600" height="1100" viewBox="0 0 1600 1100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111D"/>
      <stop offset="1" stop-color="#1A0E23"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .title    { font: 800 54px 'Segoe UI', Arial, sans-serif; fill: white; }
      .subtitle { font: 500 23px 'Segoe UI', Arial, sans-serif; fill: #C5D2E0; }
      .label    { font: 700 26px 'Segoe UI', Arial, sans-serif; fill: white; }
      .small    { font: 500 17px 'Segoe UI', Arial, sans-serif; fill: #D0DCE8; }
      .caps     { font: 800 13px 'Segoe UI', Arial, sans-serif; letter-spacing: 2px; }
      .govname  { font: 700 13px 'Segoe UI', Arial, sans-serif; fill: white; }
      .govrole  { font: 500 11px 'Segoe UI', Arial, sans-serif; }
      .line-tag { font: 800 12px 'Segoe UI', Arial, sans-serif; letter-spacing: 2px; }
      .caption  { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #607080; }
    </style>
  </defs>

  <rect width="1600" height="1100" rx="36" fill="url(#bg)"/>

  <!-- Title -->
  <text x="80" y="90" class="title">AGENT LEE — CORE TEAM TOPOLOGY</text>
  <text x="80" y="130" class="subtitle">Star topology · Lee Prime at centre · 8 specialist bloodline heads on axes · Governance Corps as satellite ring</text>

  <!-- Connector lines — centre (800,560) to family heads with bloodline colour -->
  <line x1="800" y1="455" x2="800" y2="308"  stroke="#06B6D4" stroke-width="2.5" stroke-opacity="0.35"/>
  <line x1="800" y1="455" x2="1080" y2="328" stroke="#F97316" stroke-width="2.5" stroke-opacity="0.35"/>
  <line x1="800" y1="455" x2="1225" y2="560" stroke="#00BFFF" stroke-width="2.5" stroke-opacity="0.35"/>
  <line x1="800" y1="455" x2="1080" y2="792" stroke="#3B82F6" stroke-width="2.5" stroke-opacity="0.35"/>
  <line x1="800" y1="655" x2="800" y2="812"  stroke="#EF4444" stroke-width="2.5" stroke-opacity="0.35"/>
  <line x1="800" y1="655" x2="520"  y2="792" stroke="#EC4899" stroke-width="2.5" stroke-opacity="0.35"/>
  <line x1="800" y1="560" x2="375"  y2="560" stroke="#8B5CF6" stroke-width="2.5" stroke-opacity="0.35"/>
  <line x1="800" y1="455" x2="520"  y2="328" stroke="#10B981" stroke-width="2.5" stroke-opacity="0.35"/>

  <!-- Governance satellite connectors (dashed) -->
  <line x1="800" y1="408" x2="730"  y2="88"  stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="5 4" stroke-opacity="0.5"/>
  <line x1="800" y1="408" x2="800"  y2="82"  stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="5 4" stroke-opacity="0.5"/>
  <line x1="800" y1="408" x2="870"  y2="88"  stroke="#39FF14" stroke-width="1.5" stroke-dasharray="5 4" stroke-opacity="0.5"/>
  <line x1="1080" y1="792" x2="1350" y2="938" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="5 4" stroke-opacity="0.5"/>
  <line x1="800"  y1="812" x2="800"  y2="940" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="5 4" stroke-opacity="0.5"/>

  <!-- LEE PRIME — centre -->
  <circle cx="800" cy="560" r="145" fill="#1C1430" stroke="#FFD700" stroke-width="4" filter="url(#glow)"/>
  <text x="800" y="532" text-anchor="middle" class="caps" fill="#FFD700" font-size="14">ORCHESTRATOR · LEE LINE</text>
  <text x="800" y="572" text-anchor="middle" class="label" font-size="30">Agent Lee</text>
  <text x="800" y="606" text-anchor="middle" class="small" font-size="16">Plan · Delegate · Verify · Deliver</text>

  <!-- ATLAS — N (800,205) VECTOR #06B6D4 -->
  <circle cx="800" cy="205" r="95" fill="#061E30" stroke="#06B6D4" stroke-width="3" filter="url(#softglow)"/>
  <text x="800" y="197" text-anchor="middle" class="label">Atlas</text>
  <text x="800" y="224" text-anchor="middle" class="small" font-size="15">Research &amp; Discovery</text>
  <text x="800" y="148" text-anchor="middle" class="line-tag" fill="#06B6D4" font-size="13">VECTOR LINE</text>

  <!-- NOVA — NE (1110,315) FORGE #F97316 -->
  <circle cx="1110" cy="315" r="95" fill="#1E0C00" stroke="#F97316" stroke-width="3" filter="url(#softglow)"/>
  <text x="1110" y="307" text-anchor="middle" class="label">Nova</text>
  <text x="1110" y="334" text-anchor="middle" class="small" font-size="15">Code &amp; VM Work</text>
  <text x="1210" y="258" text-anchor="middle" class="line-tag" fill="#F97316" font-size="13">FORGE LINE</text>

  <!-- NEXUS — E (1260,560) NEXUS #00BFFF -->
  <circle cx="1280" cy="560" r="95" fill="#001520" stroke="#00BFFF" stroke-width="3" filter="url(#softglow)"/>
  <text x="1280" y="552" text-anchor="middle" class="label">Nexus</text>
  <text x="1280" y="579" text-anchor="middle" class="small" font-size="15">Deployment &amp; Launch</text>
  <text x="1375" y="515" text-anchor="middle" class="line-tag" fill="#00BFFF" font-size="13">NEXUS LINE</text>

  <!-- SAGE — SE (1110,810) ARCHIVE #3B82F6 -->
  <circle cx="1110" cy="812" r="95" fill="#081428" stroke="#3B82F6" stroke-width="3" filter="url(#softglow)"/>
  <text x="1110" y="804" text-anchor="middle" class="label">Sage</text>
  <text x="1110" y="831" text-anchor="middle" class="small" font-size="15">Memory &amp; Dreams</text>
  <text x="1210" y="868" text-anchor="middle" class="line-tag" fill="#3B82F6" font-size="13">ARCHIVE LINE</text>

  <!-- SHIELD — S (800,920) AEGIS #EF4444 -->
  <circle cx="800" cy="920" r="95" fill="#1A0808" stroke="#EF4444" stroke-width="3" filter="url(#softglow)"/>
  <text x="800" y="912" text-anchor="middle" class="label">Shield</text>
  <text x="800" y="939" text-anchor="middle" class="small" font-size="15">Security &amp; Health</text>
  <text x="800" y="972" text-anchor="middle" class="line-tag" fill="#EF4444" font-size="13">AEGIS LINE</text>

  <!-- PIXEL — SW (490,810) AURA #EC4899 -->
  <circle cx="490" cy="812" r="95" fill="#1E0818" stroke="#EC4899" stroke-width="3" filter="url(#softglow)"/>
  <text x="490" y="804" text-anchor="middle" class="label">Pixel</text>
  <text x="490" y="831" text-anchor="middle" class="small" font-size="15">Visual &amp; Voxel</text>
  <text x="380" y="868" text-anchor="middle" class="line-tag" fill="#EC4899" font-size="13">AURA LINE</text>

  <!-- BRAIN — W (320,560) SENTINEL #8B5CF6 -->
  <circle cx="320" cy="560" r="95" fill="#100C26" stroke="#8B5CF6" stroke-width="3" filter="url(#softglow)"/>
  <text x="320" y="552" text-anchor="middle" class="label">Brain</text>
  <text x="320" y="579" text-anchor="middle" class="small" font-size="15">Neural Overseer</text>
  <text x="224" y="515" text-anchor="middle" class="line-tag" fill="#8B5CF6" font-size="13">SENTINEL LINE</text>

  <!-- ARIA/ECHO — NW (490,315) AURA #EC4899 -->
  <circle cx="490" cy="315" r="95" fill="#200A1A" stroke="#EC4899" stroke-width="3" filter="url(#softglow)"/>
  <text x="490" y="297" text-anchor="middle" class="label">Aria</text>
  <text x="490" y="322" text-anchor="middle" class="small" font-size="13">Language &amp; Social</text>
  <text x="490" y="344" text-anchor="middle" class="small" fill="#F9A8D4" font-size="12">+ Echo (Voice)</text>
  <text x="385" y="258" text-anchor="middle" class="line-tag" fill="#EC4899" font-size="13">AURA LINE</text>

  <!-- GOVERNANCE CORPS SATELLITES (small, above Atlas) -->
  <!-- Librarian Aegis -->
  <circle cx="720" cy="76" r="30" fill="#160C2E" stroke="#8B5CF6" stroke-width="2"/>
  <text x="720" y="70" text-anchor="middle" class="govname" font-size="11">LIBRARIAN</text>
  <text x="720" y="86" text-anchor="middle" class="govrole" fill="#A78BFA" font-size="10">Docs Officer</text>

  <!-- Marshal Verify -->
  <circle cx="800" cy="68" r="30" fill="#150C2E" stroke="#7C3AED" stroke-width="2"/>
  <text x="800" y="62" text-anchor="middle" class="govname" font-size="11">MARSHAL</text>
  <text x="800" y="78" text-anchor="middle" class="govrole" fill="#C084FC" font-size="10">Verify Corps</text>

  <!-- Leeway Standards -->
  <circle cx="880" cy="76" r="30" fill="#091E09" stroke="#39FF14" stroke-width="2"/>
  <text x="880" y="70" text-anchor="middle" class="govname" font-size="11">STANDARDS</text>
  <text x="880" y="86" text-anchor="middle" class="govrole" fill="#4ADE80" font-size="10">Policy Bridge</text>

  <!-- Clerk Archive (under Sage) -->
  <circle cx="1350" cy="950" r="30" fill="#1C1000" stroke="#F59E0B" stroke-width="2"/>
  <text x="1350" y="944" text-anchor="middle" class="govname" font-size="11">CLERK</text>
  <text x="1350" y="960" text-anchor="middle" class="govrole" fill="#FCD34D" font-size="10">Reports Index</text>

  <!-- Janitor Sentinel (under Shield) -->
  <circle cx="800" cy="1048" r="30" fill="#1A0808" stroke="#EF4444" stroke-width="2"/>
  <text x="800" y="1042" text-anchor="middle" class="govname" font-size="11">JANITOR</text>
  <text x="800" y="1058" text-anchor="middle" class="govrole" fill="#F87171" font-size="10">Cleanup</text>

  <!-- Legend strip -->
  <rect x="80" y="1072" width="1420" height="1" fill="#2A3A4A"/>
  <text x="80"  y="1092" class="caption">● Large circle = Bloodline Head   ● Small circle = Governance Corps satellite   ● Dashed line = governance orbit</text>
</svg>