<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111F"/>
      <stop offset="1" stop-color="#130A1F"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00F0FF"/>
      <stop offset="1" stop-color="#77FFF7"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#AC6BFF"/>
      <stop offset="1" stop-color="#F36EFF"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7CFF7A"/>
      <stop offset="1" stop-color="#1BFFB0"/>
    </linearGradient>
    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 800 54px 'Segoe UI', Arial, sans-serif; fill: white; letter-spacing: 1px; }
      .subtitle { font: 500 24px 'Segoe UI', Arial, sans-serif; fill: #A9BCD0; }
      .label { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: white; }
      .small { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #C9D7E5; }
      .caps { font: 800 16px 'Segoe UI', Arial, sans-serif; fill: #A7F7FF; letter-spacing: 2px; }
    </style>
  </defs>
  <rect width="1600" height="900" rx="32" fill="url(#bg)"/>
  <circle cx="1380" cy="140" r="180" fill="#20174A" opacity="0.45"/>
  <circle cx="260" cy="760" r="220" fill="#032C33" opacity="0.4"/>
  <text x="90" y="100" class="title">AGENT LEE PLATFORM OVERVIEW</text>
  <text x="90" y="180" class="subtitle" fill="#00F0FF">Partnered & live-connected with LeeWay-Edge-RTC (voice/RTC backbone)</text>
  <text x="90" y="210" class="small" fill="#A7F7FF">See: https://github.com/4citeB4U/LeeWay-Edge-RTC</text>
  <line x1="970" y1="320" x2="1400" y2="320" stroke="#00F0FF" stroke-width="4" marker-end="url(#arrowhead)"/>
  <text x="1100" y="310" class="small" fill="#00F0FF">Live RTC/Voice Link</text>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00F0FF" />
    </marker>
  </defs>
  <text x="90" y="140" class="subtitle">A VM-first digital operator with a memory core, specialist agent team, and MCP constellation.</text>

  <rect x="630" y="210" width="340" height="140" rx="24" fill="#101D31" stroke="url(#cyan)" stroke-width="3" filter="url(#glowCyan)"/>
  <text x="690" y="255" class="caps">CORE ENTITY</text>
  <text x="697" y="295" class="label">Agent Lee</text>
  <text x="682" y="328" class="small">Orchestrates, plans, verifies, and delivers.</text>

  <rect x="140" y="250" width="260" height="110" rx="20" fill="#121B2A" stroke="#4FD7FF" stroke-width="2"/>
  <text x="205" y="300" class="label">User</text>
  <text x="177" y="332" class="small">Intent, goals, files, voice</text>

  <rect x="1140" y="230" width="290" height="120" rx="20" fill="#1A1427" stroke="#D77AFF" stroke-width="2"/>
  <text x="1205" y="278" class="label">Memory Lake</text>
  <text x="1177" y="312" class="small">Logs, recall, summaries, insight</text>

  <rect x="200" y="520" width="270" height="110" rx="20" fill="#101D31" stroke="#00F0FF" stroke-width="2"/>
  <text x="282" y="567" class="label">AgentVM</text>
  <text x="228" y="600" class="small">Controlled execution and verification</text>

  <rect x="1110" y="500" width="340" height="130" rx="20" fill="#142514" stroke="#67FF90" stroke-width="2"/>
  <text x="1220" y="548" class="label">MCP Network</text>
  <text x="1150" y="582" class="small">Planner, Memory, Voice, Vision, Desktop, Browser</text>

  <rect x="525" y="470" width="550" height="260" rx="26" fill="#161327" stroke="url(#violet)" stroke-width="2"/>
  <text x="725" y="515" class="caps">SPECIALIST TEAM</text>
  <g>
    <rect x="565" y="550" width="110" height="54" rx="14" fill="#221A38" stroke="#7AFFFF"/>
    <text x="594" y="584" class="small">Atlas</text>
    <rect x="695" y="550" width="110" height="54" rx="14" fill="#221A38" stroke="#7AFFFF"/>
    <text x="725" y="584" class="small">Nova</text>
    <rect x="825" y="550" width="110" height="54" rx="14" fill="#221A38" stroke="#7AFFFF"/>
    <text x="856" y="584" class="small">Echo</text>
    <rect x="955" y="550" width="110" height="54" rx="14" fill="#221A38" stroke="#7AFFFF"/>
    <text x="987" y="584" class="small">Sage</text>
    <rect x="630" y="628" width="110" height="54" rx="14" fill="#221A38" stroke="#7AFFFF"/>
    <text x="660" y="662" class="small">Shield</text>
    <rect x="760" y="628" width="110" height="54" rx="14" fill="#221A38" stroke="#7AFFFF"/>
    <text x="793" y="662" class="small">Pixel</text>
    <rect x="890" y="628" width="110" height="54" rx="14" fill="#221A38" stroke="#7AFFFF"/>
    <text x="918" y="662" class="small">Nexus</text>
    <rect x="565" y="628" width="110" height="54" rx="14" fill="#221A38" stroke="#7AFFFF"/>
    <text x="603" y="662" class="small">Aria</text>
  </g>

  <path d="M400 305C490 305 540 280 630 280" stroke="#5AD8FF" stroke-width="3"/>
  <path d="M970 280C1035 280 1070 290 1140 290" stroke="#A67EFF" stroke-width="3"/>
  <path d="M740 350C720 390 710 420 685 470" stroke="#8AF1FF" stroke-width="3"/>
  <path d="M655 350C585 395 520 430 420 530" stroke="#4FD7FF" stroke-width="3"/>
  <path d="M945 345C1060 390 1140 430 1220 520" stroke="#70FF9F" stroke-width="3"/>
  <text x="92" y="842" class="small">Leeway Innovations • Agent Lee OS • Visual reference asset for README, canon, and in-app lore surfaces.</text>
</svg>