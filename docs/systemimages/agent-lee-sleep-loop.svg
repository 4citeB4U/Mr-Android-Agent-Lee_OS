<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09101A"/>
      <stop offset="1" stop-color="#140B22"/>
    </linearGradient>
    <style>
      .title { font: 800 54px 'Segoe UI', Arial, sans-serif; fill: white; }
      .subtitle { font: 500 24px 'Segoe UI', Arial, sans-serif; fill: #C1D0DF; }
      .label { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: white; }
      .small { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #D6E0E8; }
    </style>
  </defs>
  <rect width="1600" height="900" rx="36" fill="url(#bg)"/>
  <text x="80" y="96" class="title">AGENT LEE SLEEP LOOP</text>
  <text x="80" y="136" class="subtitle">The reflective cycle: experience becomes memory, memory becomes dream, dream becomes insight.</text>

  <g>
    <circle cx="260" cy="470" r="96" fill="#16263B" stroke="#68E8FF" stroke-width="3"/>
